
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Streckenkunde – Vorgabe vergleichen (v3.1)</title>
<style>
@page { size: A3 landscape; margin: 15mm; }

:root{
 --ui-bg:#f6f7f8;--ui-bg-hover:#ffffff;--ui-border:#dcdde1;--ui-text:#1c1c1c;
 --ui-shadow:0 4px 10px rgba(0,0,0,.08);--ui-shadow-hover:0 6px 14px rgba(0,0,0,.12)
}

html,body{height:100%;margin:0}
body{font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;overflow:hidden}

#toolbar{
 height:42px;background:linear-gradient(#fafafa,#eeeeee);
 border-bottom:1px solid #d0d0d0;display:flex;align-items:center;gap:8px;padding:0 8px
}

#container{flex:1;display:flex;overflow:hidden}
#mapContainer{flex:3;overflow:hidden;cursor:grab;position:relative}
#mapContainer svg{width:100%;height:100%}
#sidebar{flex:1;border-left:1px solid #ccc;padding:12px;background:#fafafa}

button,select,input[type=file]{
 appearance:none;border:1px solid var(--ui-border);background:var(--ui-bg);
 color:var(--ui-text);font-size:13px;font-weight:600;padding:7px 14px;
 border-radius:16px;box-shadow:var(--ui-shadow);cursor:pointer;
 transition:all .15s ease
}

button:hover,select:hover,input[type=file]:hover{background:var(--ui-bg-hover);box-shadow:var(--ui-shadow-hover)}

.legend{list-style:none;padding:0;margin:0}
.legend li{display:flex;align-items:center;margin:6px 0;font-size:13px}
.dot{width:12px;height:12px;border-radius:50%;margin-right:8px}

.kundig{fill:#1e90ff!important}
.auffrischung{fill:#e53935!important}
.vorgabe-fehlt{fill:#f4d03f!important}
.unkundig{fill:#ccc!important}
.ortskunde-kundig{stroke:#2ecc71!important;stroke-width:3}

.pdf-title{display:none;text-align:center;font-size:18px;margin-bottom:10px}
.tooltip{position:absolute;background:#fff;border:1px solid #333;padding:6px;font-size:12px;pointer-events:none;z-index:20}

@media print{#toolbar,#sidebar{display:none}.pdf-title{display:block}}
</style>
</head>
<body>

<div id="toolbar">
 <strong>Titel</strong>
 <select id="titleSelect">
  <option value="">kein Titel</option>
  <option value="Streckenkunde – Vergleich mit Vorgabe">Streckenkunde – Vergleich</option>
 </select>
 <strong>Vorgabe</strong>
 <select id="vorgabeSelect"></select>
 <span id="vorgabeInfo"></span>
 <label>Streckenkunde <input type="file" id="streckenkundeInput" accept=".json"></label>
 <button onclick="window.print()">PDF A3</button>
</div>

<div id="container">
 <div id="mapContainer"><div class="pdf-title" id="pdfTitle"></div></div>
 <div id="sidebar">
  <h3>Legende</h3>
  <ul class="legend">
   <li><span class="dot" style="background:#1e90ff"></span>kundig</li>
   <li><span class="dot" style="background:#e53935"></span>Auffrischung</li>
   <li><span class="dot" style="background:#f4d03f"></span>Vorgabe fehlt</li>
   <li><span class="dot" style="background:#ccc"></span>unkundig</li>
   <li><span class="dot" style="background:#2ecc71"></span>Ortskunde kundig</li>
  </ul>
 </div>
</div>

<script src="viewer.js"></script>
</body>
</html>
