
<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streckenkunde – Auslese-Viewer (v3.5)</title>
  <style>
    @page { size: A3 landscape; margin: 12mm; }
    :root{--bg:#f6f7f8;--panel:#ffffff;--text:#1c1c1c;--muted:#6b6b6b;--line:#dcdde1;--blue:#1e90ff;--red:#e53935;--yellow:#f4d03f}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Segoe UI,Arial,Helvetica,sans-serif;color:var(--text)}
    #toolbar{display:flex;gap:8px;align-items:center;padding:10px;border-bottom:1px solid var(--line);background:linear-gradient(#fafafa,#eee)}
    .btn, select, input[type=file], input[type=text]{padding:6px 10px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;font-weight:600}
    .grid{display:grid;grid-template-columns:1.4fr 1.6fr 1.1fr;gap:12px;height:calc(100% - 52px);padding:10px;background:var(--bg)}
    .pane{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;display:flex;flex-direction:column;min-height:0}
    .list{margin-top:8px;overflow:auto;border-top:1px dashed var(--line)}
    .item{padding:6px 6px;border-bottom:1px dashed var(--line)}
    .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .left{display:flex;align-items:center;gap:8px}
    .code{font-weight:700;min-width:48px}
    .name{font-weight:600}
    .muted{color:var(--muted);font-size:12px}
    .badge{display:inline-block;width:10px;height:10px;border-radius:50%}
    .b-blue{background:var(--blue)}
    .b-yellow{background:var(--yellow)}
    .children{margin:6px 0 6px 28px;border-left:2px dotted var(--line);padding-left:8px}
    .child{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
    .chip{display:inline-block;padding:0 6px;border-radius:10px;border:1px solid var(--line);font-size:11px;color:#555;margin-left:6px}
    .ovrp{background:#e7f6e9;border-color:#b7e1bf;color:#1b7f4b}
    .ovrm{background:#fdecea;border-color:#f5c6cb;color:#a33a2a}
    .toolrow{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 2px 28px}
    .mini{padding:4px 8px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;font-size:12px}
    #meta{background:#fafafa;border:1px solid var(--line);border-radius:8px;padding:8px;max-height:36vh;overflow:auto}
    #globalError{position:fixed;left:12px;bottom:12px;background:#fff3cd;border:1px solid #f1c40f;color:#7d6608;padding:8px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);max-width:70vw;display:none;z-index:99}
    @media print{#toolbar{display:none}}
  </style>
</head>
<body>
  <div id="toolbar">
    <strong>Streckenkunde JSON</strong>
    <label class="btn"><input id="jsonInput" type="file" accept=".json" hidden> laden…</label>
    <label class="btn"><input id="svgInput" type="file" accept=".svg" hidden> (optional) SVG laden…</label>
    <label class="btn"><input id="onlyTL" type="checkbox" checked> nur Tanklager</label>
    <button id="printBtn" class="btn">PDF A3</button>
  </div>

  <div class="grid">
    <section class="pane">
      <h3>Linien <small id="linesCount"></small></h3>
      <input id="lineSearch" class="btn" placeholder="Linien filtern (z. B. 141, 311)">
      <div id="linesList" class="list"></div>
    </section>
    <section class="pane">
      <h3>Ortskunde (nur Tanklager) <small id="stationsCount"></small></h3>
      <input id="stationSearch" class="btn" placeholder="Tanklager filtern (z. B. RBL, Schweizerhalle)">
      <div id="stationsList" class="list"></div>
    </section>
    <aside class="pane">
      <h3>Vorschau</h3>
      <ul>
        <li><span class="badge b-blue"></span> Ausgewählt (kommt in die Vorgabe)</li>
        <li><span class="badge b-yellow"></span> In Quelle vorhanden, aber nicht in der Vorgabe</li>
        <li><span class="chip ovrp">OVR+</span> per Override auf kundig/auffrischung gesetzt</li>
        <li><span class="chip ovrm">OVR−</span> per Override auf unkundig gesetzt</li>
      </ul>
      <details open>
        <summary>Geladene Metadaten</summary>
        <pre id="meta"></pre>
      </details>
    </aside>
  </div>

  <div id="globalError"></div>
  <script src="viewer.js"></script>
</body>
</html>
