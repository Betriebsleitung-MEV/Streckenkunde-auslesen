
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Streckenkunde – Vorgabe vergleichen (v3)</title>
<style>
@page { size: A3 landscape; margin: 15mm; }

:root {
  --ui-bg: #f7f7f8;
  --ui-bg-hover: #ffffff;
  --ui-border: #dcdde1;
  --ui-text: #1c1c1c;
  --ui-shadow: 0 6px 14px rgba(0,0,0,0.08);
  --ui-shadow-hover: 0 8px 18px rgba(0,0,0,0.12);
}

html, body { height: 100%; margin: 0; }
body { font-family: Arial, Helvetica, sans-serif; display: flex; flex-direction: column; overflow: hidden; }

#toolbar {
  height: 52px;
  background: linear-gradient(#fafafa, #f0f0f0);
  border-bottom: 1px solid #d0d0d0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 12px;
}

#container { flex: 1; display: flex; overflow: hidden; }
#mapContainer { flex: 3; overflow: hidden; cursor: grab; position: relative; }
#mapContainer svg { width: 100%; height: 100%; }

#sidebar { flex: 1; border-left: 1px solid #ccc; padding: 12px; background:#fafafa; }

button, select, input[type=file] {
  appearance: none;
  border: 1px solid var(--ui-border);
  background: var(--ui-bg);
  color: var(--ui-text);
  font-size: 15px;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 22px;
  box-shadow: var(--ui-shadow);
  cursor: pointer;
  transition: all .15s ease;
}

button:hover, select:hover, input[type=file]:hover {
  background: var(--ui-bg-hover);
  box-shadow: var(--ui-shadow-hover);
  transform: translateY(-1px);
}

.legend span { display:inline-block;width:14px;height:14px;margin-right:6px }
.kundig{fill:#1e90ff!important}
.auffrischung{fill:#e53935!important}
.vorgabe-fehlt{fill:#f4d03f!important}
.unkundig{fill:#ccc!important}

.pdf-title { display:none; text-align:center; font-size:18px; margin-bottom:10px; }

.tooltip {
  position:absolute;background:#fff;border:1px solid #333;padding:6px;font-size:12px;pointer-events:none;z-index:20;
}

@media print {
  #toolbar, #sidebar { display:none; }
  .pdf-title { display:block; }
}
</style>
</head>
<body>

<div id="toolbar">
  <strong>Titel:</strong>
  <select id="titleSelect">
    <option value="">kein Titel</option>
    <option value="Streckenkunde – Vergleich mit Vorgabe">Standard Vergleich</option>
  </select>

  <strong>Vorgabe:</strong>
  <select id="vorgabeSelect"></select>
  <span id="vorgabeInfo"></span>

  <label>Streckenkunde <input type="file" id="streckenkundeInput" accept=".json"></label>

  <button onclick="window.print()">PDF A3</button>
</div>

<div id="container">
  <div id="mapContainer">
    <div class="pdf-title" id="pdfTitle"></div>
  </div>
  <div id="sidebar">
    <h3>Legende</h3>
    <div><span style="background:#1e90ff"></span> kundig</div>
    <div><span style="background:#e53935"></span> Auffrischung</div>
    <div><span style="background:#f4d03f"></span> Vorgabe fehlt</div>
    <div><span style="background:#ccc"></span> unkundig</div>
  </div>
</div>

<script src="viewer.js"></script>
</body>
</html>
