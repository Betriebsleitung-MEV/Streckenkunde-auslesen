<!doctype html>
<html lang="de-CH">
<head>
  <meta charset="utf-8" />
  <title>Streckenkunde – Viewer v1.7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{ --bg:#0b1220; --panel:#121a2b; --panel2:#0f1730; --text:#e8eefc; --muted:#9fb0d0; --kundig:#16a34a; --unkundig:#ef4444; --auffr:#f59e0b; --chip:#1f2a44; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .header{display:flex;gap:12px;align-items:center;padding:12px;border-bottom:1px solid rgba(255,255,255,.08);background:#0c1528;position:sticky;top:0;z-index:20}
    .header h1{font-size:18px;margin:0;font-weight:800}
    .grid{display:grid;grid-template-columns: 1.25fr 420px;gap:12px;padding:12px}
    @media (max-width: 1080px){ .grid{grid-template-columns:1fr} }
    .card{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);border-radius:12px}
    .card h2{margin:0;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;color:var(--muted)}
    .card .body{padding:12px}
    .controls{display:flex;flex-wrap:wrap;gap:8px}
    button,label.btn{height:40px;padding:0 12px;border-radius:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.07);color:var(--text);font-weight:700;cursor:pointer}
    button:hover{background:rgba(255,255,255,.12)}
    .small{font-size:12px;color:var(--muted)}
    /* SVG Frame */
    #svgFrame{height:68vh;min-height:420px;background:#fff;border-radius:10px;overflow:hidden;position:relative}
    #svgFrame object{position:absolute;inset:0;width:100%;height:100%;display:block}
    /* Capture-Layer für Pan/Zoom */
    #pzCapture{position:absolute;inset:0;cursor:grab;z-index:8;background:transparent}
    #pzCapture.panning{cursor:grabbing}
    /* Overlay-Buttons */
    .overlay{position:absolute;left:8px;top:8px;display:flex;gap:6px;z-index:9}
    .tool{height:34px;padding:0 10px;border-radius:8px;border:1px solid rgba(0,0,0,.2);background:rgba(255,255,255,.9);color:#111;font-weight:750;cursor:pointer}
    .tool:hover{background:#fff}
    /* Sidebar */
    .sidebar .body{display:flex;flex-direction:column;gap:10px}
    .search{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .search input, .search select{height:38px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:var(--panel2);color:var(--text);padding:0 10px;outline:none}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{background:var(--chip);border:1px solid rgba(255,255,255,.15);border-radius:999px;padding:3px 8px;font-size:12px;color:#cbd5e1}
    .list{display:grid;gap:8px;max-height:60vh;overflow:auto}
    .group{border:1px solid rgba(255,255,255,.12);border-radius:10px;overflow:hidden}
    .group h3{margin:0;font-size:13px;color:#9fb0d0;background:rgba(255,255,255,.05);padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
    .item{display:flex;gap:10px;align-items:flex-start;padding:10px;border-bottom:1px solid rgba(255,255,255,.06)}
    .item:last-child{border-bottom:0}
    .badge{font-size:12px;font-weight:900;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.14);white-space:nowrap}
    .badge.k{color:var(--kundig);border-color:rgba(22,163,74,.45);background:rgba(22,163,74,.10)}
    .badge.n{color:var(--unkundig);border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.12)}
    .pill{display:inline-flex;gap:4px;align-items:center;font-size:12px;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:2px 6px}
    .name{font-weight:700}
    /* Druck: A3 quer, nur Karte */
    @page { size: A3 landscape; margin: 10mm; }
    @media print {
      .header,.sidebar,.controls,.overlay{display:none !important}
      body{margin:0;background:#fff !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
      #svgFrame{height:auto !important;min-height:0 !important;border:none !important;border-radius:0 !important}
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 id="title">Streckenkunde – JSON Viewer v1.7</h1>
    <span id="meta" class="small"></span>
  </div>
  <div class="grid">
    <div class="card">
      <h2>Anzeige & Druck</h2>
      <div class="body">
        <div class="controls">
          <label class="btn">JSON laden<input id="jsonFile" type="file" accept=".json" hidden></label>
          <button onclick="window.print()">A3 PDF drucken</button>
          <span class="small" id="status">Bereit …</span>
        </div>
        <div id="svgFrame" class="card" aria-label="Kartenanzeige">
          <div class="overlay">
            <button id="btnFit" class="tool" title="Auf Fenster einpassen">Fit</button>
            <button id="btnReset" class="tool" title="Original-ViewBox wiederherstellen">Reset</button>
          </div>
          <object id="svgObj" type="image/svg+xml" data="assets/map.svg"></object>
          <div id="pzCapture" title="Mit Mausrad zoomen, mit Maus ziehen zum verschieben"></div>
          <div style="position:absolute;inset:auto 8px 8px 8px;color:#111;background:rgba(255,255,255,.9);padding:4px 6px;border-radius:8px;border:1px solid rgba(0,0,0,.2);font-size:12px">Zoom: Mausrad • Pan: Linke Maustaste ziehen</div>
        </div>
      </div>
    </div>
    <div class="card sidebar">
      <h2>Ortskunde (führend: Mitarbeiter‑JSON)</h2>
      <div class="body">
        <div class="search">
          <input id="search" placeholder="Suche … (Name, Linie)">
          <select id="filterStatus">
            <option value="all">Status: alle</option>
            <option value="kundig">nur kundig</option>
            <option value="unkundig">nur unkundig</option>
          </select>
        </div>
        <div class="chips" id="chips"></div>
        <div class="small" id="tlCount">0 Einträge</div>
        <div id="tlList" class="list"></div>
      </div>
      <div class="small" style="padding:10px 12px;border-top:1px solid rgba(255,255,255,.08)">Quelle: <b>mitarbeiter.json → ortskunde</b> (alles anzeigen; `kundig` steuert nur Status)</div>
    </div>
  </div>
  <script src="viewer.js"></script>
</body>
</html>
