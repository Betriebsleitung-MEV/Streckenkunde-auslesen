<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <title>OrtskundeViewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 20px; }
    h1 { margin-bottom: 10px; }
    .ort { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #ddd; }
    .status { font-weight: bold; width: 90px; }
    .kundig { color: green; }
    .unkundig { color: red; }
    .name { flex: 1; }
    .linien { color: #555; font-size: 0.9em; }
    .warn { color: orange; font-size: 0.9em; margin-left: 10px; }
  </style>
</head>
<body>
<h1>Ortskunde</h1>
<div id="liste">Lade Daten </div>
<script>
async function loadJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(path + ' konnte nicht geladen werden');
  return res.json();
}
function normalize(name) {
  return name.toLowerCase().replace(/\s+/g,' ').replace(/-/g,' ').replace(/\./g,'').trim();
}
(async () => {
  const mitarbeiter = await loadJSON('mitarbeiter.json');
  const stations = await loadJSON('stations_by_line.json');
  const ortskunde = mitarbeiter.ortskunde || {};
  const stationList = Array.isArray(stations) ? stations : [];
  const container = document.getElementById('liste');
  container.innerHTML = '';
  Object.entries(ortskunde).forEach(([ortName, data]) => {
    const match = stationList.find(s => normalize(s.label || '')===normalize(ortName) || normalize(s.tanklager || '')===normalize(ortName));
    const div = document.createElement('div'); div.className='ort';
    const status = document.createElement('div'); status.className='status ' + (data.kundig?'kundig':'unkundig'); status.textContent=data.kundig?'kundig':'unkundig';
    const name = document.createElement('div'); name.className='name'; name.textContent=ortName;
    const linien = document.createElement('div'); linien.className='linien'; linien.textContent='Linien: ' + (data.linien||[]).join(', ');
    div.appendChild(status); div.appendChild(name); div.appendChild(linien);
    if(!match){ const w=document.createElement('div'); w.className='warn'; w.textContent=' kein technischer Ort'; div.appendChild(w);}    
    container.appendChild(div);
  });
})();
</script>
</body>
</html>
