
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Streckenkunde – Vorgabe vergleichen</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;display:flex;height:100vh;overflow:hidden}
#toolbar{position:fixed;top:0;left:0;right:0;height:42px;background:#f2f2f2;border-bottom:1px solid #ccc;display:flex;align-items:center;gap:10px;padding:0 10px;z-index:10}
#container{display:flex;margin-top:42px;width:100%}
#mapContainer{flex:3;overflow:hidden;cursor:grab}
#sidebar{flex:1;border-left:1px solid #ccc;padding:10px;overflow:auto}
svg{user-select:none}
.kundig{fill:#1e90ff !important}
.un kundig{fill:#ccc !important}
.auffrischung{fill:#e53935 !important}
.vorgabe-fehlt{fill:#f4d03f !important}
.tooltip{position:absolute;background:#fff;border:1px solid #333;padding:6px;font-size:12px;pointer-events:none;z-index:20;max-width:260px}
</style>
</head>
<body>
<div id="toolbar">
<strong>Vorgabe:</strong>
<select id="vorgabeSelect"></select>
<span id="vorgabeInfo"></span>
</div>
<div id="container">
<div id="mapContainer"></div>
<div id="sidebar"><h3>Ortskunde</h3><div id="list"></div></div>
</div>
<script src="viewer.js"></script>
</body>
</html>
